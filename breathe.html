<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a;
            color: #e8e8f0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        /* Grain overlay */
        .grain {
            position: fixed;
            inset: -50%;
            width: 200%;
            height: 200%;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-size: 128px 128px;
            mix-blend-mode: soft-light;
            animation: grainShift 0.5s steps(1) infinite;
        }

        @keyframes grainShift {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-10%, 10%); }
            40% { transform: translate(10%, -10%); }
            60% { transform: translate(-5%, -5%); }
            80% { transform: translate(5%, 5%); }
            100% { transform: translate(0, 0); }
        }

        /* Light wash that builds behind the grain */
        .light-wash {
            position: fixed;
            inset: 0;
            z-index: 9;
            pointer-events: none;
            opacity: 0;
            transition: opacity 3s ease, background 3s ease;
            background: radial-gradient(ellipse at 50% 45%, rgba(139, 92, 246, 0.06) 0%, rgba(99, 102, 241, 0.03) 40%, transparent 70%);
        }

        /* Serotonin glow — warm fullscreen wash that builds toward breath 10 */
        .serotonin-glow {
            position: fixed;
            inset: 0;
            z-index: 8;
            pointer-events: none;
            opacity: 0;
            transition: opacity 4s ease;
            background: radial-gradient(ellipse at 50% 50%,
                rgba(167, 139, 250, 0.12) 0%,
                rgba(139, 92, 246, 0.08) 30%,
                rgba(99, 102, 241, 0.04) 60%,
                transparent 85%);
        }

        /* Ambient background */
        .ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .ambient::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: ambientPulse 10s ease-in-out infinite;
        }

        .ambient::after {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: ambientPulse 14s ease-in-out infinite reverse;
        }

        @keyframes ambientPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.7; }
        }

        /* Stars */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.7; }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: var(--size);
            height: var(--size);
            background: radial-gradient(circle, var(--color) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatUp var(--float-duration) ease-in-out infinite;
            animation-delay: var(--float-delay);
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.6; }
            100% { transform: translateY(-200px) scale(1); opacity: 0; }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 11;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
        }

        /* Welcome screen */
        .welcome {
            text-align: center;
            animation: fadeIn 2s ease-out;
        }

        .welcome h1 {
            font-size: 42px;
            font-weight: 300;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #e8e8f0 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome p {
            font-size: 18px;
            font-weight: 300;
            color: rgba(232, 232, 240, 0.5);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        /* Streak display on welcome */
        .streak-display {
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .streak-number {
            font-size: 48px;
            font-weight: 300;
            background: linear-gradient(135deg, #a5b4fc 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .streak-label {
            font-size: 13px;
            font-weight: 400;
            color: rgba(232, 232, 240, 0.35);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .streak-week {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }

        .streak-day {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 400;
            color: rgba(232, 232, 240, 0.25);
            transition: all 0.3s ease;
        }

        .streak-day.done {
            background: rgba(99, 102, 241, 0.35);
            border-color: rgba(99, 102, 241, 0.6);
            color: rgba(232, 232, 240, 0.8);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.15);
        }

        .streak-day.today {
            border-color: rgba(139, 92, 246, 0.5);
            color: rgba(232, 232, 240, 0.5);
        }

        .streak-day.today.done {
            background: rgba(139, 92, 246, 0.45);
            border-color: rgba(139, 92, 246, 0.7);
            color: #e8e8f0;
        }

        .start-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 60px;
            color: #a5b4fc;
            font-family: inherit;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .start-btn:hover {
            background: rgba(99, 102, 241, 0.25);
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        /* Breathing screen */
        .breathing-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 48px;
            animation: fadeIn 1s ease-out;
        }

        .breathing-screen.active {
            display: flex;
        }

        /* Breath circle */
        .breath-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .breath-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, rgba(139, 92, 246, 0.6), rgba(99, 102, 241, 0.3));
            transition: all 5s cubic-bezier(0.25, 0, 0.25, 1);
            box-shadow:
                0 0 60px rgba(99, 102, 241, 0.15),
                inset 0 0 30px rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 2;
        }

        .breath-circle.inhale {
            width: 240px;
            height: 240px;
            background: radial-gradient(circle at 40% 40%, rgba(139, 92, 246, 0.85), rgba(99, 102, 241, 0.5));
            box-shadow:
                0 0 120px rgba(99, 102, 241, 0.3),
                0 0 240px rgba(139, 92, 246, 0.12),
                inset 0 0 60px rgba(255, 255, 255, 0.08);
        }

        .breath-circle.hold {
            width: 240px;
            height: 240px;
            background: radial-gradient(circle at 40% 40%, rgba(139, 92, 246, 0.85), rgba(99, 102, 241, 0.5));
            box-shadow:
                0 0 120px rgba(99, 102, 241, 0.3),
                0 0 240px rgba(139, 92, 246, 0.12),
                inset 0 0 60px rgba(255, 255, 255, 0.08);
            transition: all 0.5s ease;
        }

        .breath-circle.exhale {
            width: 100px;
            height: 100px;
            transition: all 7s cubic-bezier(0.25, 0, 0.25, 1);
        }

        /* Ripple rings */
        .ripple-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            pointer-events: none;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(99, 102, 241, 0);
            width: 100px;
            height: 100px;
            transition: all 5s cubic-bezier(0.25, 0, 0.25, 1);
            opacity: 0;
        }

        .ripple.inhale {
            opacity: 1;
        }

        .ripple-1.inhale {
            width: 270px;
            height: 270px;
            border-color: rgba(99, 102, 241, 0.15);
        }

        .ripple-2.inhale {
            width: 295px;
            height: 295px;
            border-color: rgba(139, 92, 246, 0.08);
            transition-delay: 0.15s;
        }

        .ripple-3.inhale {
            width: 320px;
            height: 320px;
            border-color: rgba(167, 139, 250, 0.04);
            transition-delay: 0.3s;
        }

        .ripple.hold {
            opacity: 1;
            transition: all 0.5s ease;
        }

        .ripple-1.hold {
            width: 270px;
            height: 270px;
            border-color: rgba(99, 102, 241, 0.15);
        }

        .ripple-2.hold {
            width: 295px;
            height: 295px;
            border-color: rgba(139, 92, 246, 0.08);
        }

        .ripple-3.hold {
            width: 320px;
            height: 320px;
            border-color: rgba(167, 139, 250, 0.04);
        }

        .ripple.exhale {
            width: 100px;
            height: 100px;
            border-color: rgba(99, 102, 241, 0);
            opacity: 0;
            transition: all 7s cubic-bezier(0.25, 0, 0.25, 1);
        }

        /* Glow pulse during hold */
        .glow-pulse {
            position: absolute;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: transparent;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .glow-pulse.active {
            opacity: 1;
            animation: glowBeat 2s ease-in-out infinite;
        }

        @keyframes glowBeat {
            0%, 100% { box-shadow: 0 0 60px rgba(139, 92, 246, 0.08); }
            50% { box-shadow: 0 0 90px rgba(139, 92, 246, 0.18); }
        }

        /* Instruction text */
        .instruction {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(165, 180, 252, 0.8);
            min-height: 32px;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .instruction.fade {
            opacity: 0;
            transform: translateY(-4px);
        }

        /* Phase count-up timer */
        .phase-timer {
            font-size: 28px;
            font-weight: 200;
            color: rgba(165, 180, 252, 0.35);
            letter-spacing: 2px;
            min-height: 36px;
            font-variant-numeric: tabular-nums;
            transition: opacity 0.4s ease;
        }

        /* Counter */
        .counter {
            font-size: 15px;
            font-weight: 400;
            color: rgba(232, 232, 240, 0.35);
            letter-spacing: 1px;
        }

        /* Progress bar */
        .progress-dots {
            display: flex;
            gap: 8px;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.6s ease;
        }

        .progress-dot.complete {
            background: rgba(99, 102, 241, 0.6);
            border-color: rgba(99, 102, 241, 0.8);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.3);
        }

        .progress-dot.current {
            background: rgba(139, 92, 246, 0.4);
            border-color: rgba(139, 92, 246, 0.6);
            animation: currentDot 2.5s ease-in-out infinite;
        }

        @keyframes currentDot {
            0%, 100% { box-shadow: 0 0 8px rgba(139, 92, 246, 0.2); }
            50% { box-shadow: 0 0 16px rgba(139, 92, 246, 0.4); }
        }

        /* Complete screen */
        .complete-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
            animation: fadeIn 2s ease-out;
        }

        .complete-screen.active {
            display: flex;
        }

        .complete-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, rgba(139, 92, 246, 0.4), rgba(99, 102, 241, 0.15));
            box-shadow: 0 0 80px rgba(99, 102, 241, 0.15);
            margin-bottom: 4px;
            animation: gentlePulse 4s ease-in-out infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .complete-screen h2 {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #e8e8f0 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .complete-screen p {
            font-size: 17px;
            font-weight: 300;
            color: rgba(232, 232, 240, 0.45);
            line-height: 1.7;
            max-width: 340px;
        }

        /* Check off button */
        .check-btn {
            margin-top: 12px;
            padding: 16px 40px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 60px;
            color: #a5b4fc;
            font-family: inherit;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .check-btn:hover {
            background: rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2);
        }

        .check-btn:active {
            transform: translateY(0);
        }

        .check-btn.checked {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.5);
            color: rgba(134, 239, 172, 0.9);
            pointer-events: none;
        }

        .check-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .check-btn.checked .check-icon {
            background: rgba(34, 197, 94, 0.3);
        }

        /* Streak on complete screen */
        .complete-streak {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .complete-streak-number {
            font-size: 32px;
            font-weight: 300;
            background: linear-gradient(135deg, #a5b4fc 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .complete-streak-label {
            font-size: 12px;
            color: rgba(232, 232, 240, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .close-btn {
            padding: 12px 32px;
            background: transparent;
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 60px;
            color: rgba(165, 180, 252, 0.4);
            font-family: inherit;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
            color: rgba(165, 180, 252, 0.7);
        }

        /* Utility */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden {
            display: none !important;
        }

        /* Total breaths */
        .total-breaths {
            margin-top: 4px;
            font-size: 13px;
            font-weight: 400;
            color: rgba(232, 232, 240, 0.2);
            letter-spacing: 0.5px;
        }

        .total-breaths span {
            color: rgba(165, 180, 252, 0.4);
            font-weight: 500;
        }

        /* Time display */
        .time-display {
            position: fixed;
            top: 24px;
            right: 28px;
            font-size: 13px;
            font-weight: 400;
            color: rgba(232, 232, 240, 0.2);
            letter-spacing: 0.5px;
            z-index: 12;
        }
    </style>
</head>
<body>
    <div class="grain" id="grain"></div>
    <div class="light-wash" id="lightWash"></div>
    <div class="serotonin-glow" id="serotoninGlow"></div>
    <div class="ambient"></div>
    <div class="stars" id="stars"></div>
    <div class="particles" id="particles"></div>
    <div class="time-display" id="timeDisplay"></div>

    <div class="container">
        <!-- Welcome -->
        <div class="welcome" id="welcomeScreen">
            <h1>Time to Breathe</h1>
            <p>10 deep breaths to reset your evening.<br>Just three minutes. You deserve this.</p>
            <div class="streak-display" id="streakDisplay">
                <div class="streak-number" id="streakNumber">0</div>
                <div class="streak-label">day streak</div>
                <div class="streak-week" id="streakWeek"></div>
                <div class="total-breaths"><span id="totalBreathsWelcome">0</span> mindful breaths</div>
            </div>
            <button class="start-btn" id="startBtn">
                <span>Begin</span>
            </button>
        </div>

        <!-- Breathing -->
        <div class="breathing-screen" id="breathingScreen">
            <div class="instruction" id="instruction">Get ready...</div>
            <div class="breath-wrapper">
                <div class="ripple-container">
                    <div class="ripple ripple-1" id="ripple1"></div>
                    <div class="ripple ripple-2" id="ripple2"></div>
                    <div class="ripple ripple-3" id="ripple3"></div>
                </div>
                <div class="glow-pulse" id="glowPulse"></div>
                <div class="breath-circle" id="breathCircle"></div>
            </div>
            <div class="phase-timer" id="phaseTimer"></div>
            <div class="counter" id="counter">Breath 1 of 10</div>
            <div class="progress-dots" id="progressDots"></div>
        </div>

        <!-- Complete -->
        <div class="complete-screen" id="completeScreen">
            <div class="complete-icon"></div>
            <h2>Well done</h2>
            <p>10 breaths complete. You showed up for yourself tonight.</p>
            <button class="check-btn" id="checkBtn">
                <div class="check-icon" id="checkIcon"></div>
                <span id="checkLabel">Mark today complete</span>
            </button>
            <div class="complete-streak" id="completeStreak">
                <div class="complete-streak-number" id="completeStreakNumber">0</div>
                <div class="complete-streak-label">day streak</div>
                <div class="total-breaths"><span id="totalBreathsComplete">0</span> total mindful breaths</div>
            </div>
            <button class="close-btn" id="closeBtn">Close</button>
        </div>
    </div>

    <script>
        // ── Streak Logic ──────────────────────────────────────
        const STORAGE_KEY = 'breathe_streak_data';

        function getToday() {
            const d = new Date();
            return d.getFullYear() + '-' +
                String(d.getMonth() + 1).padStart(2, '0') + '-' +
                String(d.getDate()).padStart(2, '0');
        }

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) {}
            return { completedDays: [], totalBreaths: 0 };
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function markToday() {
            const data = loadData();
            const today = getToday();
            if (!data.completedDays.includes(today)) {
                data.completedDays.push(today);
                saveData(data);
            }
            return data;
        }

        function isTodayDone() {
            const data = loadData();
            return data.completedDays.includes(getToday());
        }

        function calcStreak() {
            const data = loadData();
            const days = data.completedDays.sort();
            if (days.length === 0) return 0;

            // Check if today or yesterday is in the list (streak is still alive)
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            const todayStr = getToday();
            const yesterdayStr = yesterday.getFullYear() + '-' +
                String(yesterday.getMonth() + 1).padStart(2, '0') + '-' +
                String(yesterday.getDate()).padStart(2, '0');

            const lastDay = days[days.length - 1];
            if (lastDay !== todayStr && lastDay !== yesterdayStr) return 0;

            // Count backwards
            let streak = 0;
            let checkDate = new Date(lastDay + 'T00:00:00');
            for (let i = days.length - 1; i >= 0; i--) {
                const expected = checkDate.getFullYear() + '-' +
                    String(checkDate.getMonth() + 1).padStart(2, '0') + '-' +
                    String(checkDate.getDate()).padStart(2, '0');
                if (days[i] === expected) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else if (days[i] < expected) {
                    break;
                }
            }
            return streak;
        }

        function getLast7Days() {
            const days = [];
            const today = new Date();
            const dayLabels = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
            const data = loadData();

            for (let i = 6; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateStr = d.getFullYear() + '-' +
                    String(d.getMonth() + 1).padStart(2, '0') + '-' +
                    String(d.getDate()).padStart(2, '0');
                days.push({
                    label: dayLabels[d.getDay()],
                    done: data.completedDays.includes(dateStr),
                    isToday: i === 0
                });
            }
            return days;
        }

        function renderStreak() {
            const streak = calcStreak();
            document.getElementById('streakNumber').textContent = streak;
            document.getElementById('completeStreakNumber').textContent = streak;

            const weekContainer = document.getElementById('streakWeek');
            weekContainer.innerHTML = '';
            getLast7Days().forEach(day => {
                const el = document.createElement('div');
                el.className = 'streak-day' +
                    (day.done ? ' done' : '') +
                    (day.isToday ? ' today' : '');
                el.textContent = day.label;
                weekContainer.appendChild(el);
            });
        }

        function addBreaths(count) {
            const data = loadData();
            data.totalBreaths = (data.totalBreaths || 0) + count;
            saveData(data);
        }

        function renderTotalBreaths() {
            const data = loadData();
            const total = data.totalBreaths || 0;
            document.getElementById('totalBreathsWelcome').textContent = total;
            document.getElementById('totalBreathsComplete').textContent = total;
        }

        function updateCheckButton() {
            const btn = document.getElementById('checkBtn');
            const icon = document.getElementById('checkIcon');
            const label = document.getElementById('checkLabel');
            if (isTodayDone()) {
                btn.classList.add('checked');
                icon.innerHTML = '&#10003;';
                label.textContent = 'Done for today';
            }
        }

        // ── Stars ─────────────────────────────────────────────
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (4 + Math.random() * 6) + 's');
            star.style.setProperty('--delay', Math.random() * 8 + 's');
            if (Math.random() > 0.7) {
                star.style.width = '3px';
                star.style.height = '3px';
                star.style.background = 'rgba(165, 180, 252, 0.25)';
            }
            starsContainer.appendChild(star);
        }

        // Floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 12; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 4 + Math.random() * 8;
            p.style.setProperty('--size', size + 'px');
            p.style.left = (30 + Math.random() * 40) + '%';
            p.style.top = (50 + Math.random() * 30) + '%';
            p.style.setProperty('--float-duration', (8 + Math.random() * 10) + 's');
            p.style.setProperty('--float-delay', Math.random() * 12 + 's');
            const colors = [
                'rgba(99, 102, 241, 0.4)',
                'rgba(139, 92, 246, 0.3)',
                'rgba(167, 139, 250, 0.3)',
                'rgba(196, 181, 253, 0.2)'
            ];
            p.style.setProperty('--color', colors[Math.floor(Math.random() * colors.length)]);
            particlesContainer.appendChild(p);
        }

        // Time
        function updateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').textContent =
                now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }
        updateTime();
        setInterval(updateTime, 30000);

        // Progress dots
        const progressDots = document.getElementById('progressDots');
        for (let i = 0; i < 10; i++) {
            const dot = document.createElement('div');
            dot.className = 'progress-dot';
            dot.dataset.index = i;
            progressDots.appendChild(dot);
        }

        // ── Grain / Light Wash Progress ───────────────────────
        const grain = document.getElementById('grain');
        const lightWash = document.getElementById('lightWash');

        function updateGrain(breathIndex) {
            // Exponential curve so the last few breaths really flood the screen
            const progress = breathIndex / 10;
            const eased = progress * progress; // accelerates toward the end

            // Grain: subtle early, rich film texture by breath 10
            grain.style.opacity = eased * 0.55;

            // Light wash: grows and shifts warmer
            lightWash.style.opacity = eased * 1.0;
            const warmth = Math.floor(progress * 40); // shift purple toward warm
            lightWash.style.background = `radial-gradient(ellipse at 50% 45%,
                rgba(${139 + warmth}, ${92 + warmth * 0.5}, 246, ${0.06 + eased * 0.18}) 0%,
                rgba(${99 + warmth}, ${102 + warmth * 0.3}, 241, ${0.03 + eased * 0.1}) 40%,
                transparent 70%)`;

            // Serotonin glow: fullscreen warm bloom that fills by the end
            const glow = document.getElementById('serotoninGlow');
            glow.style.opacity = eased * 0.9;
            glow.style.background = `radial-gradient(ellipse at 50% 50%,
                rgba(${167 + warmth}, ${139 + warmth * 0.6}, 250, ${eased * 0.25}) 0%,
                rgba(${139 + warmth}, ${92 + warmth * 0.5}, 246, ${eased * 0.18}) 30%,
                rgba(${99 + warmth}, ${102 + warmth * 0.3}, 241, ${eased * 0.1}) 60%,
                rgba(${80 + warmth}, ${80 + warmth * 0.3}, 200, ${eased * 0.04}) 85%,
                transparent 100%)`;
        }

        // ── Breathing ─────────────────────────────────────────
        const INHALE_MS = 5000;
        const HOLD_MS = 4000;
        const EXHALE_MS = 7000;
        const PAUSE_MS = 1500;
        const TOTAL_BREATHS = 10;
        let currentBreath = 0;
        let phaseInterval = null;

        const welcomeScreen = document.getElementById('welcomeScreen');
        const breathingScreen = document.getElementById('breathingScreen');
        const completeScreen = document.getElementById('completeScreen');
        const breathCircle = document.getElementById('breathCircle');
        const instruction = document.getElementById('instruction');
        const counterEl = document.getElementById('counter');
        const phaseTimer = document.getElementById('phaseTimer');
        const glowPulse = document.getElementById('glowPulse');
        const ripple1 = document.getElementById('ripple1');
        const ripple2 = document.getElementById('ripple2');
        const ripple3 = document.getElementById('ripple3');
        const ripples = [ripple1, ripple2, ripple3];

        function setPhase(phase) {
            breathCircle.className = 'breath-circle ' + phase;
            ripples.forEach(r => r.className = r.className.replace(/ (inhale|hold|exhale)/g, '') + ' ' + phase);
            glowPulse.classList.toggle('active', phase === 'hold');
        }

        function startPhaseTimer(durationMs, direction) {
            clearInterval(phaseInterval);
            const total = Math.ceil(durationMs / 1000);
            let count = direction === 'down' ? total : 1;
            phaseTimer.textContent = count;
            phaseInterval = setInterval(() => {
                count += direction === 'down' ? -1 : 1;
                const done = direction === 'down' ? count < 1 : count > total;
                if (!done) {
                    phaseTimer.textContent = count;
                } else {
                    phaseTimer.textContent = '';
                    clearInterval(phaseInterval);
                }
            }, 1000);
        }

        function setInstruction(text) {
            instruction.classList.add('fade');
            setTimeout(() => {
                instruction.textContent = text;
                instruction.classList.remove('fade');
            }, 300);
        }

        function updateProgress(breathIndex) {
            document.querySelectorAll('.progress-dot').forEach((dot, i) => {
                dot.className = 'progress-dot';
                if (i < breathIndex) dot.classList.add('complete');
                if (i === breathIndex) dot.classList.add('current');
            });
        }

        function doBreath(index) {
            if (index >= TOTAL_BREATHS) {
                finishSession();
                return;
            }

            currentBreath = index;
            counterEl.textContent = `Breath ${index + 1} of ${TOTAL_BREATHS}`;
            updateProgress(index);
            updateGrain(index);

            // Inhale
            setInstruction('Breathe in');
            setPhase('inhale');
            startPhaseTimer(INHALE_MS, 'up');

            setTimeout(() => {
                // Hold
                setInstruction('Hold');
                setPhase('hold');
                startPhaseTimer(HOLD_MS, 'up');

                setTimeout(() => {
                    // Exhale
                    setInstruction('Breathe out');
                    setPhase('exhale');
                    startPhaseTimer(EXHALE_MS, 'down');

                    setTimeout(() => {
                        phaseTimer.textContent = '';
                        document.querySelectorAll('.progress-dot')[index].className = 'progress-dot complete';

                        setTimeout(() => {
                            doBreath(index + 1);
                        }, PAUSE_MS);
                    }, EXHALE_MS);
                }, HOLD_MS);
            }, INHALE_MS);
        }

        function finishSession() {
            clearInterval(phaseInterval);
            updateGrain(TOTAL_BREATHS);
            addBreaths(TOTAL_BREATHS);
            breathingScreen.classList.remove('active');
            completeScreen.classList.add('active');
            updateCheckButton();
            renderStreak();
            renderTotalBreaths();
        }

        // ── Events ────────────────────────────────────────────
        document.getElementById('startBtn').addEventListener('click', () => {
            welcomeScreen.classList.add('hidden');
            breathingScreen.classList.add('active');
            instruction.textContent = 'Get ready...';
            setTimeout(() => doBreath(0), 2500);
        });

        document.getElementById('checkBtn').addEventListener('click', () => {
            markToday();
            updateCheckButton();
            renderStreak();
        });

        document.getElementById('closeBtn').addEventListener('click', () => {
            window.close();
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:rgba(232,232,240,0.3);font-family:Inter,sans-serif;font-weight:300;font-size:18px;background:#0a0a1a;">You can close this tab now.</div>';
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !welcomeScreen.classList.contains('hidden')) {
                e.preventDefault();
                document.getElementById('startBtn').click();
            }
            if (e.code === 'Escape') {
                window.close();
            }
        });

        // ── Init ──────────────────────────────────────────────
        renderStreak();
        renderTotalBreaths();
        updateCheckButton();
    </script>
</body>
</html>
