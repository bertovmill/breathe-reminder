<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.25)"/>
      <stop offset="60%" stop-color="rgba(99,102,241,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="orb" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
    <radialGradient id="orbInner" cx="35%" cy="35%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- Outer glow -->
  <circle cx="512" cy="492" r="380" fill="url(#glow)"/>

  <!-- Outer ring 3 -->
  <circle cx="512" cy="492" r="320" fill="none" stroke="rgba(99,102,241,0.06)" stroke-width="1"/>

  <!-- Outer ring 2 -->
  <circle cx="512" cy="492" r="280" fill="none" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>

  <!-- Outer ring 1 -->
  <circle cx="512" cy="492" r="240" fill="none" stroke="rgba(99,102,241,0.18)" stroke-width="1.5"/>

  <!-- Main orb -->
  <circle cx="512" cy="492" r="180" fill="url(#orb)" opacity="0.9"/>

  <!-- Inner highlight -->
  <circle cx="512" cy="492" r="180" fill="url(#orbInner)"/>

  <!-- Subtle outer bloom -->
  <circle cx="512" cy="492" r="200" fill="none" stroke="rgba(139,92,246,0.2)" stroke-width="2"/>
</svg>
